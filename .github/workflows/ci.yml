name: CI_action

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies for my-nest-app
      working-directory: worksheet2/my-nest-app
      run: npm install

    - name: Run tests for my-nest-app
      working-directory: worksheet2/my-nest-app
      run: npm test

    - name: Build my-nest-app
      working-directory: worksheet2/my-nest-app
      run: npm run build

    - name: Install dependencies for my-react-app
      working-directory: worksheet2/my-react-app
      run: npm install

    - name: Run tests for my-react-app
      working-directory: worksheet2/my-react-app
      run: npm test

    - name: Build my-react-app
      working-directory: worksheet2/my-react-app
      run: npm run build
